<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance – Mentora IAS</title>
  <meta name="description" content="Mentora IAS website is currently down for maintenance. We will be back soon." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      text-align: center;
      padding: 2rem;
    }

    .maintenance {
      max-width: 600px;
    }

    .maintenance__logo {
      width: 120px;
      height: auto;
      margin-bottom: 2.5rem;
    }

    .maintenance__icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
    }

    .maintenance__title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }

    .maintenance__text {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .maintenance__contact {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.9;
    }

    .maintenance__contact a {
      color: #fbbf24;
      text-decoration: none;
    }

    .maintenance__contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="maintenance">
    <img src="/Mentora_logo_2.png" alt="Mentora IAS" class="maintenance__logo" />
    <div class="maintenance__icon">🛠️</div>
    <h1 class="maintenance__title">We'll be back soon</h1>
    <p class="maintenance__text">
      Our website is currently down for scheduled maintenance.<br />
      We're working hard to improve your experience and will be back online shortly.
      Thank you for your patience.
    </p>
    <div class="maintenance__contact">
      Need help right now?<br />
      <a href="tel:+919133333034">+91 9133333034</a> &nbsp;·&nbsp;
      <a href="mailto:Info@mentoraias.com">Info@mentoraias.com</a>
    </div>
  </main>
</body>

</html>
